mutation UpdateProductWithImage(
  $itemType: String!
  $subcategoryId: Float!
  $categoryId: Float!
  $vipPrice: Float!
  $price: Float!
  $productName: String!
  $productId: Float!
  $picture: Upload
) {
  UpdateProductWithImage(
    item_type: $itemType
    subcategory_id: $subcategoryId
    category_id: $categoryId
    vip_price: $vipPrice
    price: $price
    product_name: $productName
    product_id: $productId
    picture: $picture
  ) {
    code
    success
    message
  }
}
