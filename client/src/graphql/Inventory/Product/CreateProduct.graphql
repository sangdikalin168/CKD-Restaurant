mutation CreateProduct(
  $picture: Upload!
  $itemType: String!
  $subcategoryId: Float!
  $categoryId: Float!
  $vipPrice: Float!
  $price: Float!
  $productName: String!
) {
  CreateProduct(
    picture: $picture
    item_type: $itemType
    subcategory_id: $subcategoryId
    category_id: $categoryId
    vip_price: $vipPrice
    price: $price
    product_name: $productName
  ) {
    code
    success
    message
  }
}
